name: lego
description: App com suporte offline-first via Hive + sincronização Firestore
publish_to: "none"
version: 1.0.6+7

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase (versões atualizadas para melhor compatibilidade)
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

  # Offline-first
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.5
  shared_preferences: ^2.2.2

  # Util
  archive: ^3.4.10
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2
  diacritic: ^0.1.5

  file_picker: ^8.0.0
  excel: ^4.0.6
  csv: ^6.0.0
  http: ^1.2.2
  package_info_plus: ^8.0.0
  open_filex: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Necessários para gerar os adapters Hive
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/firestore_dump.json
    - assets/plantas/
